services:
  backend:
    build: ./smarttable-backend
    container_name: smarttable-backend
    env_file: .env
    volumes:
      - storage_data:/var/www/html/storage
      - ./smarttable-backend/storage/logs:/var/www/html/storage/logs
    networks:
      - smarttable-network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: smarttable-nginx
    ports:
      - "8000:80"
    volumes:
      - ./smarttable-backend:/var/www/html:ro
      - ./smarttable-backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - storage_data:/var/www/html/storage:ro
    networks:
      - smarttable-network
    depends_on:
      - backend

  db:
    image: mysql:8.0
    container_name: smarttable-db
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-smarttable}
      MYSQL_USER: ${DB_USERNAME:-smarttable}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - smarttable-network

networks:
  smarttable-network:
    driver: bridge

volumes:
  mysql_data:
  storage_data:
