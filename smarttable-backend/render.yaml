services:
  - type: web
    name: smarttable-backend
    env: php
    buildCommand: composer install --no-dev && php artisan config:cache && php artisan route:cache && php artisan migrate --force
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: smarttable-db
          property: host
      - key: DB_DATABASE
        fromDatabase:
          name: smarttable-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: smarttable-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: smarttable-db
          property: password
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false
      - key: SESSION_DOMAIN
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: smarttable-db
    plan: free
    databaseName: smarttable
